{@com.faforever.web.ClientData clientData}
{#include default}
  <div class="main-card">
  <div class="main-card-inner">
  <div>
    <h2 id="client-header">{clientData.clientName}</h2>
    <div id="client-details">
    {#if !clientData.logoUri.isNull}
        <div id="client-logo">
            <img src="{clientData.logoUri}" alt="{msg:consent_clientLogo()}">
        </div>
    {/if}
        <div id="client-urls">
            <div id="client-url"><a target="_blank" th:href="${clientData.clientUri}" th:text=""
                                    href="#">{clientData.clientUri}</a></div>
            <ul id="legal" class="pipe-separated">
                <!-- no closing li to avoid whitespace -->
                <li th:if="${!#strings.isEmpty(client.tosUri)}"><a th:href="${client.tosUri}" href="#"
                                                                   th:text="#{consent.termsOfService}"
                                                                   target="_blank">Terms of Service</a>
                <li th:if="${!#strings.isEmpty(client.policyUri)}"><a th:href="${client.policyUri}" href="#"
                                                                      th:text="#{consent.privacyStatement}"
                                                                      target="_blank">Privacy statement</a>
            </ul>
        </div>
    </div>

    <p id="scope-header" th:text="#{consent.appRequest}">This app would like to:</p>
    <ul class="oauth-scopes">
        <li th:each="scope : ${consentRequest.requestedScope}">
            <div th:text="${#messages.msgOrNull('oauth2.scope.'+scope) == null ?
                       #messages.msg('oauth2.scope.textMissing', scope) : #messages.msg('oauth2.scope.'+scope)}"></div>
            <i th:if="${#messages.msgOrNull('oauth2.scope.'+scope+'.description') != null}"
               class="tooltip fas fa-info-circle"><span class="tooltiptext"
                                                        th:text="${#messages.msg('oauth2.scope.'+scope+'.description')}">Tool tip text</span></i>
        </li>
    </ul>

    <div class="flex-container">
        <form id="denial-form" name='denialForm' th:action="@{/oauth2/consent}+'?_csrf='+${_csrf}" th:object="${denyForm}" method='post'>
            <input type="hidden" name="challenge" th:value="*{challenge}"/>
            <input type="hidden" name="action" value="deny" th:field="*{action}">
            <input type="submit" name="deny" th:value="#{consent.deny}" value="Deny" class="btn"/>
        </form>
        <form id="confirmation-form" name="confirmationForm" th:action="@{/oauth2/consent}+'?_csrf='+${_csrf}" th:object="${permitForm}" method='post'>
            <input type="hidden" name="challenge" th:value="*{challenge}"/>
            <input type="hidden" name="action" value="permit" th:field="*{action}">
            <input type="submit" name="authorize" th:value="#{consent.authorize}" value="Authorize" class="btn btn-danger"/>
        </form>
    </div>

    <footer>
        <ul th:replace="~{fragments/socialIcons :: socialIcons}"></ul>
    </footer>
  </div>
  </div>
  </div>
{/include}
