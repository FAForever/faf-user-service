<html>
<head>
    <meta charset="UTF-8"/>
    <title>FAForever</title>
    <link rel="stylesheet" href="../../css/style.css" type="text/css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css"
          integrity="sha512-HK5fgLBL+xu6dm/Ii3z4xhlSUyZgTT9tuc/hSrtw6uzJOvgRr2a9jyxxT1ely+B+xFAmJKVSTbpM/CuL7qxO8w=="
          crossorigin="anonymous"/>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap" rel="stylesheet">
    <script type="application/javascript" src="../../js/bg-switcher.js"></script>
</head>
<body>
<div class="background"></div>
<header>
    <div id="leftheader">
        <a href="https://www.faforever.com"><img src="https://faforever.com/images/faf-logo.png"
                                                 alt="FAForever Logo"></a>
        <h1>{inject:quteHelper.environment} {msg:title}</h1>
    </div>
    <div id="rightheader">
        {#if inject:quteHelper.isLoggedIn}<p>{msg:header_loggedInAs(inject:quteHelper.userName)}</p>{/if}
    </div>
</header>
<div>
    {#insert}No body!{/}
</div>
</body>
</html>
